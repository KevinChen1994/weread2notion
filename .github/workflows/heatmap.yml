name: Sync Heatmap

on:
  schedule:
    - cron: '5 0 * * *'  # UTC 0:05 = 北京时间 8:05（书籍同步完成后）
  workflow_dispatch:

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate heatmap
        env:
          WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        run: python -m weread2notion --heatmap

      - name: Commit and push heatmap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add OUT_FOLDER/
          git diff --cached --quiet || git commit -m "update heatmap"
          git push
